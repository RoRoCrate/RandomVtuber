<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>抽選ページ</title>
</head>
<body>

<h2>抽選中...</h2>

<script>
const links = [
    "https://youtube.com/shorts/2li8RSaoPkM",
    "https://youtube.com/shorts/hKKuJT7FAmQ",
    "https://youtube.com/shorts/-vF1vm8Vkd8"
];

// 完全ランダム（重複あり）
const selected = links[Math.floor(Math.random() * links.length)];

document.querySelector("h2").textContent = "移動中...";

setTimeout(() => {
    location.replace(selected);
}, 500);
</script>

</body>
</html>
